              <div style="font-size:2rem;font-weight:800;color:#7C3AED;" id="finalScore"></div>
              <div style="font-size:15px;font-weight:700;color:#4B2996;margin-top:6px;" id="finalMsg"></div>
              <div style="font-size:13px;color:#666;margin-top:6px;" id="finalRank"></div>
              <button class="btn" onclick="startGame()" style="margin-top:14px;width:100%;">もう一度プレイ</button>

    <script>

    let difficulty = 1;
    let currentQ = 0;
    let score = 0;
    let answers = [];
    let oddIndex = -1;
    let canClick = true;
    const TOTAL = 10;

    document.addEventListener('DOMContentLoaded', startGame);

    function setDiff(d, btn) {
      difficulty = d;
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      startGame();
    }

    function startGame() {
      currentQ = 0;
      score = 0;
      answers = [];
      document.getElementById('result').classList.remove('show');
      nextQuestion();
    }

    function nextQuestion() {
      if (currentQ >= TOTAL) {
        showResult();
        return;
      }
      canClick = true;
      document.getElementById('qNum').textContent = currentQ + 1;
      document.getElementById('stageMsg').textContent = '違う色のマスを見つけよう！';
      renderScoreDots();

      const gridSize = difficulty === 1 ? 3 : difficulty === 2 ? 4 : 5;
      const total = gridSize * gridSize;

      const baseH = Math.floor(Math.random() * 360);
      const baseS = 60 + Math.floor(Math.random() * 30);
      const baseL = 50 + Math.floor(Math.random() * 20);

      const diff = difficulty === 1 ? 30 : difficulty === 2 ? 18 : 10;
      const oddH = (baseH + diff + Math.floor(Math.random() * 10)) % 360;

      oddIndex = Math.floor(Math.random() * total);

      const grid = document.getElementById('colorGrid');
      grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
      grid.innerHTML = '';

      for (let i = 0; i < total; i++) {
        const cell = document.createElement('div');
        cell.className = 'color-cell';
        const h = i === oddIndex ? oddH : baseH;
        cell.style.background = `hsl(${h}, ${baseS}%, ${baseL}%)`;
        cell.dataset.idx = i;
        cell.addEventListener('click', () => onCellClick(i, cell));
        grid.appendChild(cell);
      }
    }

    function onCellClick(idx, cell) {
      if (!canClick) return;
      canClick = false;

      const cells = document.querySelectorAll('.color-cell');
      cells[oddIndex].classList.add('correct');

      if (idx === oddIndex) {
        score++;
        answers.push('correct');
        document.getElementById('stageMsg').textContent = '正解！';
      } else {
        cell.classList.add('wrong');
        answers.push('wrong');
        document.getElementById('stageMsg').textContent = '残念！正解は光っているマスです';
      }

      renderScoreDots();
      currentQ++;
      setTimeout(nextQuestion, 900);
    }

    function renderScoreDots() {
      const html = Array.from({length: TOTAL}, (_, i) => {
        const cls = i < answers.length ? answers[i] : '';
        return `<div class="score-dot ${cls}"></div>`;
      }).join('');
      document.getElementById('scoreDots').innerHTML = html;
    }

    function showResult() {
      document.getElementById('finalScore').textContent = `${score} / ${TOTAL}`;
      const pct = score / TOTAL;
      let msg, rank;
      if (pct === 1)       { msg = '完璧！天才的な色彩感覚です！';    rank = '🏆 Rank: SSS'; }
      else if (pct >= 0.8) { msg = '素晴らしい！プロ級の色眼力！';    rank = '🥇 Rank: S'; }
      else if (pct >= 0.6) { msg = 'なかなか優秀！センスがあります'; rank = '🥈 Rank: A'; }
      else if (pct >= 0.4) { msg = 'まだまだ訓練が必要です';          rank = '🥉 Rank: B'; }
      else                 { msg = '色彩トレーニングを重ねましょう！'; rank = '📝 Rank: C'; }
      document.getElementById('finalMsg').textContent = msg;
      document.getElementById('finalRank').textContent = rank;
      document.getElementById('result').classList.add('show');
    }
    </script>
